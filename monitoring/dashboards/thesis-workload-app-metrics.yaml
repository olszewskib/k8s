apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-thesis-workload-app
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  thesis-workload-app-metrics.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 30,
          "title": "Throughput",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(workload_http_requests_total{namespace=\"thesis-autoscaler\"}[$__rate_interval])) by (status_code)",
              "legendFormat": "HTTP {{status_code}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Status Code",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "lineWidth": 2, "fillOpacity": 8 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(workload_http_requests_total{namespace=\"thesis-autoscaler\",status_code!~\"2..\"}[$__rate_interval])) / sum(rate(workload_http_requests_total{namespace=\"thesis-autoscaler\"}[$__rate_interval]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "HTTP Error Rate (non-2xx) — source metric",
          "description": "Direct from workload-app /metrics. More precise than Traefik router metrics because it sees the status code at the handler level.",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 31,
          "title": "Latency — Thesis KPIs (P95 / P99)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "s",
              "min": 0
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "P50 (median)" },
                "properties": [{ "id": "custom.lineStyle", "value": { "dash": [6, 3], "fill": "dash" } }]
              }
            ]
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 10 },
          "id": 3,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum(rate(workload_http_request_duration_seconds_bucket{namespace=\"thesis-autoscaler\",path=\"/cpu\"}[$__rate_interval])) by (le))",
              "legendFormat": "P99",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum(rate(workload_http_request_duration_seconds_bucket{namespace=\"thesis-autoscaler\",path=\"/cpu\"}[$__rate_interval])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum(rate(workload_http_request_duration_seconds_bucket{namespace=\"thesis-autoscaler\",path=\"/cpu\"}[$__rate_interval])) by (le))",
              "legendFormat": "P50 (median)",
              "refId": "C"
            }
          ],
          "title": "End-to-End Latency Percentiles — /cpu",
          "description": "Screenshot this panel for exp1_p95_latency.png and again for M2/M3 at the same time scale for exp_comparison_p95.png. The P95/P99 divergence during the under-replicated phase is the headline thesis result.",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 },
          "id": 32,
          "title": "Active Requests & In-Flight Queuing",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(workload_active_requests{namespace=\"thesis-autoscaler\"})",
              "legendFormat": "In-flight requests",
              "refId": "A"
            }
          ],
          "title": "Active In-Flight Requests",
          "description": "Spikes here when pods are under-replicated and the queue is building. Should drop sharply when the operator adds replicas.",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 28 },
          "id": 33,
          "title": "Fibonacci Compute Time (CPU load characterisation)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 3 },
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 29 },
          "id": 5,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum(rate(workload_fib_duration_seconds_bucket{namespace=\"thesis-autoscaler\"}[$__rate_interval])) by (le, n))",
              "legendFormat": "P95 — n={{n}}",
              "refId": "A"
            }
          ],
          "title": "Fibonacci Compute Duration P95 by n",
          "description": "Shows CPU cost per request. Under replica saturation, compute time increases because fewer goroutines are sharing the available CPU. Useful for §3 implementation description.",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 38,
      "tags": ["thesis", "workload", "latency"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Prometheus"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Thesis — Workload App Metrics",
      "uid": "thesis-workload-app",
      "version": 1
    }
