apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-thesis-scaling
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  thesis-scaling-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 10,
          "title": "Replica Scaling",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "short",
              "min": 0
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total" },
                "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Available" },
                "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Ready" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_deployment_status_replicas{namespace=\"thesis-autoscaler\",deployment=\"workload-app\"}",
              "legendFormat": "Total",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_deployment_status_replicas_available{namespace=\"thesis-autoscaler\",deployment=\"workload-app\"}",
              "legendFormat": "Available",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_deployment_status_replicas_ready{namespace=\"thesis-autoscaler\",deployment=\"workload-app\"}",
              "legendFormat": "Ready",
              "refId": "C"
            }
          ],
          "title": "Deployment Replica Count — workload-app",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "short",
              "min": 0
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "HPA Max" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } },
                  { "id": "custom.lineStyle", "value": { "dash": [8, 4], "fill": "dash" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "HPA Min" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } },
                  { "id": "custom.lineStyle", "value": { "dash": [8, 4], "fill": "dash" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 10 },
          "id": 2,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"thesis-autoscaler\",horizontalpodautoscaler=\"workload-app\"}",
              "legendFormat": "HPA Desired",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"thesis-autoscaler\",horizontalpodautoscaler=\"workload-app\"}",
              "legendFormat": "HPA Current",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"thesis-autoscaler\",horizontalpodautoscaler=\"workload-app\"}",
              "legendFormat": "HPA Max",
              "refId": "C"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_horizontalpodautoscaler_spec_min_replicas{namespace=\"thesis-autoscaler\",horizontalpodautoscaler=\"workload-app\"}",
              "legendFormat": "HPA Min",
              "refId": "D"
            }
          ],
          "title": "HPA Status — Desired vs Current",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 },
          "id": 11,
          "title": "Resource Usage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 3 },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "id": 3,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"thesis-autoscaler\",container=\"workload-app\"}[$__rate_interval])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage per Pod (cores)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 3 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"thesis-autoscaler\",container=\"workload-app\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Memory Usage per Pod",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["thesis", "scaling"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Prometheus"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Thesis — Scaling Overview",
      "uid": "thesis-scaling-overview",
      "version": 1
    }
