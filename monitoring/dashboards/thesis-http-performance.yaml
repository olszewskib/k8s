apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-thesis-http
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  thesis-http-performance.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_router_requests_total{router=~\"thesis-autoscaler.*\"}[$__rate_interval])) by (code)",
              "legendFormat": "HTTP {{code}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Status Code — via Traefik",
          "description": "HTTP request rate split by status code. Traefik router label matches namespace 'thesis-autoscaler'. If empty, check that Traefik router labels are enabled: --metrics.prometheus.addRoutersLabels=true",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit",
              "min": 0,
              "max": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 9 },
          "id": 2,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(traefik_router_requests_total{router=~\"thesis-autoscaler.*\",code!~\"2..\"}[$__rate_interval])) / sum(rate(traefik_router_requests_total{router=~\"thesis-autoscaler.*\"}[$__rate_interval]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "HTTP Error Rate (non-2xx)",
          "description": "Fraction of requests returning non-2xx status. Near-zero during M1 baseline validates the experiment. Threshold lines at 1% (yellow) and 5% (red).",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "s",
              "min": 0
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "P50 (median)" },
                "properties": [{ "id": "custom.lineStyle", "value": { "dash": [6, 3], "fill": "dash" } }]
              }
            ]
          },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 9 },
          "id": 3,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum(rate(traefik_router_request_duration_seconds_bucket{router=~\"thesis-autoscaler.*\"}[$__rate_interval])) by (le))",
              "legendFormat": "P99",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum(rate(traefik_router_request_duration_seconds_bucket{router=~\"thesis-autoscaler.*\"}[$__rate_interval])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum(rate(traefik_router_request_duration_seconds_bucket{router=~\"thesis-autoscaler.*\"}[$__rate_interval])) by (le))",
              "legendFormat": "P50 (median)",
              "refId": "C"
            }
          ],
          "title": "Response Latency Percentiles (P50 / P95 / P99)",
          "description": "P95/P99 latency during the spike is the primary KPI for comparing M1 (HPA), M2 (rule-based operator), and M3 (LLM operator). Screenshot this panel for each experiment at the same time range for the thesis comparison figure.",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 10,
          "title": "Active Connections",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 5 },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 19 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "traefik_router_open_connections{router=~\"thesis-autoscaler.*\"}",
              "legendFormat": "Open — {{router}}",
              "refId": "A"
            }
          ],
          "title": "Open Connections via Traefik",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["thesis", "http", "latency"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Prometheus"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Thesis — HTTP Performance",
      "uid": "thesis-http-perf",
      "version": 1
    }
