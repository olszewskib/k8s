# Promtail — DaemonSet log collector for k3s homelab
#
# Chart: grafana/promtail  (grafana.github.io/helm-charts)
# Namespace: monitoring
#
# Promtail runs one pod per node. It tails /var/log/pods/**/*.log (CRI format),
# attaches Kubernetes metadata labels (namespace, pod, container, app), and
# ships everything to Loki over HTTP.

# ── Loki push target ─────────────────────────────────────────────────────────

config:
  # Point at Loki's API in the same namespace.
  # No gateway → connect directly to the single binary service on port 3100.
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      # Batch small to keep memory low on a single homelab node.
      batchwait: 1s
      batchsize: 1048576   # 1 MiB

  # ── Pipeline stages ───────────────────────────────────────────────────────
  # CRI stage parses the containerd/CRI log format that k3s uses.
  # The label stage promotes useful k8s metadata into Loki stream labels.
  snippets:
    pipelineStages:
      - cri: {}

    # Extra Kubernetes metadata added to every log stream as Loki labels.
    # Keep the label cardinality low — use LogQL selectors, not labels, for
    # per-pod filtering in Grafana.
    extraRelabelConfigs:
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(app_kubernetes_io_name|app_kubernetes_io_component)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_container_name]
        target_label: container

# ── DaemonSet resource limits ─────────────────────────────────────────────────

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# ── Tolerations — scrape logs from every node including control-plane ────────

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

# ── ServiceMonitor — optional Prometheus scrape of Promtail itself ────────────

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
