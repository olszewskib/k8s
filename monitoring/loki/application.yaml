apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  name: loki
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: homelab
  sources:
  - chart: loki
    helm:
      valueFiles:
      - $k8s/monitoring/loki/values.yaml
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 9.5.13
  - ref: k8s
    repoURL: https://github.com/olszewskib/k8s.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
    - CreateNamespace=true
