# values.yaml

grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - grafana.olszewskib.org
    path: /
    pathType: Prefix
    tls:
      - hosts:
        - grafana.olszewskib.org
        secretName: grafana-tls

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"
      folder: /var/lib/grafana/dashboards/default
      provider:
        foldersFromFilesStructure: false

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: false

  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer

  # Loki datasource — provisioned at Grafana startup, survives restarts.
  # Loki must be deployed first (monitoring/loki/application.yaml).
  # The URL targets the single binary service directly (no gateway).
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
        timeout: 60


prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.olszewskib.org
    paths:
      - /
    pathType: Prefix
  prometheusSpec:
    retention: 180d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager.olszewskib.org
    paths:
      - /
    pathType: Prefix
